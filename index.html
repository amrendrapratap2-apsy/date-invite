<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mansha 💜</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
  background: #07071a;
  font-family: 'DM Sans', sans-serif;
}

/* ROOT */
#root {
  width: 100%;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, #07071a 50%),
              radial-gradient(ellipse at 80% 20%, #0d1a3a 0%, transparent 50%);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 35px;
  border-radius: 20px;
  width: 100%;
  max-width: 520px;
  margin: 40px 0;
  text-align: center;
  color: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

/* TEXT */
h1 { font-size: 26px; margin-bottom: 10px; }
h2 { font-size: 20px; margin-bottom: 10px; color: #e8d5ff; }
p { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 12px; }

/* BUTTONS */
button {
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary { background: #7c3aed; color: white; width: 100%; }
.btn-yes { background: #10b981; color: white; width: 100%; }
.btn-no {
  background: rgba(239,68,68,0.2);
  color: #fca5a5;
  position: relative;
}

/* IMAGE */
img {
  width: 120px;
  border-radius: 50%;
  margin: 15px 0;
  object-fit: cover;
}

/* STEPS */
.step { display: none; }
.step.active { display: block; }

/* TYPEWRITER */
.cursor {
  display: inline-block;
  width: 2px;
  height: 16px;
  background: #a855f7;
  animation: blink .8s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* HEART FLOAT */
.heart {
  position: fixed;
  bottom: -10px;
  animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
  from { transform: translateY(0); }
  to { transform: translateY(-100vh); }
}
</style>
</head>

<body>

<div id="root">
<div class="card">

<!-- STEP 0 -->
<div class="step active" id="step-0">
  <h1>Hey Dr. Mansha 🦷💜</h1>
  <p>After 4–5 years… I think I deserve 20 seconds 😌</p>
  <button class="btn-primary" onclick="goTo(1)">Continue →</button>
</div>

<!-- STEP 1 -->
<div class="step" id="step-1">
  <h2>Medical Report 📋</h2>
  <img src="https://github.com/amrendrapratap2-apsy/date-invite/blob/1894ff97e39d3ca38a96d90bcfd52781d186017c/image.jpeg" onerror="this.style.display='none'">
  <p><b>Diagnosis:</b> You've been on my mind for years 😌</p>
  <p><b>Prescription:</b> One date 💊</p>
  <button class="btn-primary" onclick="goTo(2)">Next →</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step-2">
  <h2>Listen… 💭</h2>
  <p id="type"></p>
  <button id="nextBtn" class="btn-primary" style="display:none" onclick="goTo(3)">Final →</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step-3">
  <h1>Will you go on a date with me? 💜</h1>
  <button class="btn-yes" onclick="yes()">Yes 😍</button>
  <button class="btn-no" id="noBtn">No 😶</button>
</div>

<!-- SUCCESS -->
<div class="step" id="step-yes">
  <h1>Yay 😌💜</h1>
  <p>Good decision, Doctor 😏</p>
</div>

</div>
</div>

<script>
let step = 0;
const noBtn = document.getElementById("noBtn");

function goTo(n){
  document.getElementById("step-"+step).classList.remove("active");
  step = n;
  document.getElementById("step-"+n).classList.add("active");
  if(n===2) typeText();
}

function typeText(){
  const text = "We've known each other for years… and honestly, I think we should try something more than just random chats 😌";
  let i=0;
  const el=document.getElementById("type");
  const interval=setInterval(()=>{
    el.innerHTML = text.slice(0,i) + "<span class='cursor'></span>";
    i++;
    if(i>text.length){
      clearInterval(interval);
      el.innerHTML=text;
      document.getElementById("nextBtn").style.display="block";
    }
  },30);
}

let texts=["No 😶","Are you sure? 🤨","Think again 🥺","Wrong answer 😤","Last chance 😭"];
let i=0;

noBtn.addEventListener("mouseover",()=>{
  noBtn.innerText=texts[i%texts.length];
  i++;
  noBtn.style.position="absolute";
  noBtn.style.left=Math.random()*80+"%";
  noBtn.style.top=Math.random()*80+"%";
});

function yes(){
  goTo("yes");
}
</script>

</body>
</html>
